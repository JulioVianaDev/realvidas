<!-- @dsCard group="Website" viewport="1280x880" name="Real Vidas — site institucional" subtitle="Home, serviços, planos e orçamento — click-through" -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Real Vidas — Remoções e Emergências 24h</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); }
  /* responsive helpers used by the kit components */
  .rv-show-sm { display: none !important; }
  @media (max-width: 860px) {
    .rv-nav { display: none !important; }
    .rv-hide-sm { display: none !important; }
    .rv-show-sm { display: inline-flex !important; }
    .rv-hero-grid, .rv-about-grid, .rv-footer-grid { grid-template-columns: 1fr !important; }
    .rv-hide-md { display: none !important; }
    .rv-form-grid, .rv-form-grid3 { grid-template-columns: 1fr !important; }
    .rv-std-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 1024px) {
    .rv-hide-md { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="SiteHeader.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ServicesSection.jsx"></script>
<script type="text/babel" src="AboutSection.jsx"></script>
<script type="text/babel" src="PlansSection.jsx"></script>
<script type="text/babel" src="QuoteForm.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="FloatingActions.jsx"></script>
<script type="text/babel" data-presets="react">
  const { Breadcrumb } = window.RealVidasDesignSystem_066fed;
  function PageHead({ crumb, title, subtitle }) {
    return (
      <section style={{ background: "var(--grad-institutional)", color: "#fff", padding: "clamp(2rem,5vw,3.5rem) var(--gutter)" }}>
        <div style={{ maxWidth: "var(--container-xl)", margin: "0 auto" }}>
          <div style={{ marginBottom: "var(--space-4)", filter: "brightness(0) invert(1)", opacity: 0.85 }}>
            <Breadcrumb items={crumb} />
          </div>
          <h1 style={{ fontFamily: "var(--font-display)", fontWeight: "var(--fw-extrabold)", fontSize: "clamp(2rem,4vw,3rem)", margin: 0, color: "#fff" }}>{title}</h1>
          {subtitle && <p style={{ fontFamily: "var(--font-body)", fontSize: "var(--text-md)", color: "rgba(255,255,255,0.9)", margin: "var(--space-3) 0 0", maxWidth: 620 }}>{subtitle}</p>}
        </div>
      </section>
    );
  }

  function App() {
    const [page, setPage] = React.useState("inicio");
    const go = (p) => { setPage(p); window.scrollTo({ top: 0, behavior: "smooth" }); };

    let body;
    if (page === "inicio") {
      body = <><Hero onNavigate={go} /><ServicesSection compact /><AboutSection /><PlansSection /></>;
    } else if (page === "servicos") {
      body = <><PageHead crumb={[{label:"Início",href:"#"},{label:"Serviços"}]} title="Nossos serviços" subtitle="Estrutura completa para urgência e emergência médica, remoção de pacientes e cobertura de eventos." /><ServicesSection /></>;
    } else if (page === "empresa") {
      body = <><PageHead crumb={[{label:"Início",href:"#"},{label:"A Empresa"}]} title="A Real Vidas" subtitle="Oriunda da consultoria e do treinamento em saúde, criada para salvar vidas com agilidade e humanização." /><AboutSection /></>;
    } else if (page === "planos") {
      body = <><PageHead crumb={[{label:"Início",href:"#"},{label:"Associe-se"}]} title="Associe-se" subtitle="Planos e modelos de atendimento que se adaptam às suas necessidades." /><PlansSection /></>;
    } else if (page === "contato") {
      body = <><PageHead crumb={[{label:"Início",href:"#"},{label:"Fale Conosco"}]} title="Fale Conosco" subtitle="Solicite um orçamento de remoção ou fale com a nossa equipe pelo WhatsApp 24h." /><QuoteForm /></>;
    }

    return (
      <>
        <SiteHeader page={page} onNavigate={go} />
        <main>{body}</main>
        <Footer onNavigate={go} />
        <FloatingActions />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
