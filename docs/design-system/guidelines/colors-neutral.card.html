<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Cool slate ramp — surfaces, borders, text" -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-canvas);padding:18px;font-family:var(--font-body)}
  .ramp{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs);border:1px solid var(--border)}
  .chip{flex:1;height:60px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-family:var(--font-mono);font-size:9px;color:#fff}
  .chip.dk{color:#1a1a1a}
</style></head><body>
<div class="ramp">
  <div class="chip dk" style="background:var(--neutral-0)">0</div>
  <div class="chip dk" style="background:var(--neutral-50)">50</div>
  <div class="chip dk" style="background:var(--neutral-100)">100</div>
  <div class="chip dk" style="background:var(--neutral-150)">150</div>
  <div class="chip dk" style="background:var(--neutral-200)">200</div>
  <div class="chip dk" style="background:var(--neutral-300)">300</div>
  <div class="chip dk" style="background:var(--neutral-400)">400</div>
  <div class="chip" style="background:var(--neutral-500)">500</div>
  <div class="chip" style="background:var(--neutral-600)">600</div>
  <div class="chip" style="background:var(--neutral-700)">700</div>
  <div class="chip" style="background:var(--neutral-800)">800</div>
  <div class="chip" style="background:var(--neutral-850)">850</div>
  <div class="chip" style="background:var(--neutral-900)">900</div>
  <div class="chip" style="background:var(--neutral-950)">950</div>
</div>
</body></html>
