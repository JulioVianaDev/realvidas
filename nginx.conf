user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on; tcp_nopush on; keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml image/svg+xml;

    # Cache map — HTML never cached, assets cached 1 year
    map $sent_http_content_type $cache_control {
        default                  "no-cache";
        ~*text/html              "no-cache";
        ~*text/css               "public, max-age=31536000, immutable";
        ~*application/javascript "public, max-age=31536000, immutable";
        ~*image/                 "public, max-age=31536000, immutable";
        ~*font/                  "public, max-age=31536000, immutable";
    }

    # ── HTTP → HTTPS redirect + certbot challenge ──
    server {
        listen 80;
        server_name juliovianadev.com www.juliovianadev.com
                    realvidas.io www.realvidas.io;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / { return 301 https://$host$request_uri; }
    }

    # ── juliovianadev.com ──────────────────────────
    server {
        listen 443 ssl;
        server_name juliovianadev.com www.juliovianadev.com;

        ssl_certificate     /etc/letsencrypt/live/juliovianadev.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/juliovianadev.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root  /app/portfolio/dist;
        index index.html;
        etag  on;
        add_header Cache-Control $cache_control always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            etag on;
        }
    }

    # ── realvidas.io ───────────────────────────────────
    server {
        listen 443 ssl;
        server_name realvidas.io www.realvidas.io;

        ssl_certificate     /etc/letsencrypt/live/realvidas.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/realvidas.io/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root  /app/realvidas/apps/frontend/build;
        index index.html;
        etag  on;
        add_header Cache-Control $cache_control always;


        # /v1 → your backend running directly on the host machine
        # 172.17.0.1 = Docker bridge gateway = the host
        # Replace with your actual docker0 IP from Step 2
        location /v1 {
            proxy_pass         http://172.17.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /ws/ {
            proxy_pass         http://172.17.0.1:8080/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_buffering    off;
        }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            etag on;
        }

        # SPA fallback — must be after /v1 block
        location / {
              try_files $uri $uri/ /index.html;
        }
    }
}