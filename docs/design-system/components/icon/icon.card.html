<!-- @dsCard group="Components" viewport="700x260" name="Iconography" subtitle="Lucide-geometry line icons + WhatsApp glyph, all currentColor" -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 20px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap: 10px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 12px 6px;
          background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text-body); }
  .cell span { font-size: 10px; color: var(--text-subtle); font-family: var(--font-mono); text-align: center; }
  .cell.brand { color: var(--brand); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Icon } = window.RealVidasDesignSystem_066fed;
  const names = ["phone","whatsapp","mail","map-pin","clock","heart-pulse","activity","shield-check","truck","plane","flame","graduation-cap","calendar","file-text","credit-card","user","users","star","search","alert-triangle","info","check-circle","arrow-right","send"];
  function Demo() {
    return (
      <div className="grid">
        {names.map(n => (
          <div className={"cell" + (n==="phone"||n==="heart-pulse"||n==="whatsapp"?" brand":"")} key={n}>
            <Icon name={n} size={24} />
            <span>{n}</span>
          </div>
        ))}
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
