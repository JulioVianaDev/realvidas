<!-- @dsCard group="Colors" viewport="700x190" name="Brand ramps" subtitle="Laranja · Azul royal · Verde — full tonal ramps" -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-canvas);padding:18px;font-family:var(--font-body)}
  .ramp{display:flex;margin-bottom:8px;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs)}
  .chip{flex:1;height:42px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-family:var(--font-mono);font-size:9px;color:#fff}
  .chip.dk{color:#1a1a1a}
  .lbl{font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-subtle);width:64px;display:flex;align-items:center}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:6px}
  .row .ramp{flex:1;margin:0}
</style></head><body>
<div class="row"><span class="lbl">Laranja</span><div class="ramp">
  <div class="chip dk" style="background:var(--orange-50)">50</div><div class="chip dk" style="background:var(--orange-100)">100</div><div class="chip dk" style="background:var(--orange-200)">200</div><div class="chip dk" style="background:var(--orange-300)">300</div><div class="chip" style="background:var(--orange-400)">400</div><div class="chip" style="background:var(--orange-500)">500</div><div class="chip" style="background:var(--orange-600)">600</div><div class="chip" style="background:var(--orange-700)">700</div><div class="chip" style="background:var(--orange-800)">800</div><div class="chip" style="background:var(--orange-900)">900</div><div class="chip" style="background:var(--orange-950)">950</div>
</div></div>
<div class="row"><span class="lbl">Azul</span><div class="ramp">
  <div class="chip dk" style="background:var(--blue-50)">50</div><div class="chip dk" style="background:var(--blue-100)">100</div><div class="chip dk" style="background:var(--blue-200)">200</div><div class="chip dk" style="background:var(--blue-300)">300</div><div class="chip" style="background:var(--blue-400)">400</div><div class="chip" style="background:var(--blue-500)">500</div><div class="chip" style="background:var(--blue-600)">600</div><div class="chip" style="background:var(--blue-700)">700</div><div class="chip" style="background:var(--blue-800)">800</div><div class="chip" style="background:var(--blue-900)">900</div><div class="chip" style="background:var(--blue-950)">950</div>
</div></div>
<div class="row"><span class="lbl">Verde</span><div class="ramp">
  <div class="chip dk" style="background:var(--green-50)">50</div><div class="chip dk" style="background:var(--green-100)">100</div><div class="chip dk" style="background:var(--green-200)">200</div><div class="chip dk" style="background:var(--green-300)">300</div><div class="chip" style="background:var(--green-400)">400</div><div class="chip" style="background:var(--green-500)">500</div><div class="chip" style="background:var(--green-600)">600</div><div class="chip" style="background:var(--green-700)">700</div><div class="chip" style="background:var(--green-800)">800</div><div class="chip" style="background:var(--green-900)">900</div><div class="chip dk" style="background:var(--green-50);opacity:0"></div>
</div></div>
</body></html>
