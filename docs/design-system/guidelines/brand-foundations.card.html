<!-- @dsCard group="Brand" viewport="700x200" name="Mark, gradients & voice" subtitle="The Real Vidas mark, signal gradients, and tone" -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-canvas);padding:20px;font-family:var(--font-body);display:flex;gap:18px;align-items:stretch}
  .mark{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:10px;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 24px}
  .mark img{height:54px;width:auto}
  .grads{flex:1;display:flex;flex-direction:column;gap:8px}
  .g{height:38px;border-radius:var(--radius-md);display:flex;align-items:center;padding:0 14px;color:#fff;font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:.02em}
  .voice{flex:1.1;background:var(--brand-soft);border:1px solid var(--brand-border);border-radius:var(--radius-lg);padding:14px 16px}
  .voice .e{font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--brand)}
  .voice p{margin:6px 0 0;font-size:13px;color:var(--text-body);line-height:1.5}
  .voice b{color:var(--text-strong)}
</style></head><body>
  <div class="mark">
    <img src="../assets/logo/realvidas-logo.webp" alt="Real Vidas">
  </div>
  <div class="grads">
    <div class="g" style="background:var(--grad-emergency)">Emergência — laranja</div>
    <div class="g" style="background:var(--grad-institutional)">Institucional — azul</div>
    <div class="g" style="background:var(--grad-vital)">Vital — verde</div>
  </div>
  <div class="voice">
    <span class="e">Voz da marca</span>
    <p><b>Acolhedora, confiante, direta.</b> Falamos no “nós” institucional e tratamos o cliente por “você”. Urgência sem alarme: “Pensou em remoções ou emergências? Fale com a Real Vidas.”</p>
  </div>
</body></html>
