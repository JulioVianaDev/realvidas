<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — space-1 → space-16" -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-canvas);padding:20px;font-family:var(--font-body)}
  .row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--grad-emergency);border-radius:var(--radius-xs)}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle)}
</style></head><body>
<div class="row">
  <div class="item"><div class="bar" style="width:var(--space-1);height:var(--space-1)"></div><span class="lab">1·4</span></div>
  <div class="item"><div class="bar" style="width:var(--space-2);height:var(--space-2)"></div><span class="lab">2·8</span></div>
  <div class="item"><div class="bar" style="width:var(--space-3);height:var(--space-3)"></div><span class="lab">3·12</span></div>
  <div class="item"><div class="bar" style="width:var(--space-4);height:var(--space-4)"></div><span class="lab">4·16</span></div>
  <div class="item"><div class="bar" style="width:var(--space-6);height:var(--space-6)"></div><span class="lab">6·24</span></div>
  <div class="item"><div class="bar" style="width:var(--space-8);height:var(--space-8)"></div><span class="lab">8·32</span></div>
  <div class="item"><div class="bar" style="width:var(--space-12);height:var(--space-12)"></div><span class="lab">12·48</span></div>
  <div class="item"><div class="bar" style="width:var(--space-16);height:var(--space-16)"></div><span class="lab">16·64</span></div>
</div>
</body></html>
