<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 22px; font-family: var(--font-body); }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 14px; }
  .lbl { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-subtle); width: 100%; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const NS = window.RealVidasDesignSystem_066fed;
  const { Button, IconButton, ThemeToggle, Icon } = NS;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Variants</span>
          <Button variant="primary" leftIcon={<Icon name="phone" />}>Solicitar orçamento</Button>
          <Button variant="secondary">A Empresa</Button>
          <Button variant="accent">Associe-se</Button>
          <Button variant="whatsapp" leftIcon={<Icon name="whatsapp" />}>WhatsApp 24h</Button>
          <Button variant="outline" rightIcon={<Icon name="arrow-right" />}>Ver planos</Button>
          <Button variant="ghost">Notícias</Button>
        </div>
        <div className="row"><span className="lbl">Sizes &amp; states</span>
          <Button size="sm" variant="primary">Pequeno</Button>
          <Button size="md" variant="primary">Médio</Button>
          <Button size="lg" variant="primary">Grande</Button>
          <Button variant="primary" loading>Enviando</Button>
          <Button variant="primary" disabled>Indisponível</Button>
        </div>
        <div className="row"><span className="lbl">Icon buttons &amp; theme</span>
          <IconButton icon={<Icon name="whatsapp" />} label="WhatsApp" variant="whatsapp" round size="lg" />
          <IconButton icon={<Icon name="phone" />} label="Ligar" variant="primary" round size="lg" />
          <IconButton icon={<Icon name="search" />} label="Buscar" variant="outline" />
          <IconButton icon={<Icon name="menu" />} label="Menu" variant="ghost" />
          <IconButton icon={<Icon name="heart-pulse" />} label="Favoritos" variant="soft" />
          <ThemeToggle />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
