name: Deploy

on:
    push:
        branches: [main]

concurrency:
    group: deploy-main
    cancel-in-progress: false

env:
    NX_REJECT_UNKNOWN_LOCAL_CACHE: 0
    NODE_VERSION: "22"
    GO_VERSION: "1.25"
    DOCKER_REGISTRY: ghcr.io
    DOCKER_IMAGE_PREFIX: ${{ github.repository_owner }}

permissions:
    contents: write
    packages: write

jobs:
    # ─── Version Bump ────────────────────────────────────────────
    version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.bump.outputs.version }}
            sha_short: ${{ steps.bump.outputs.sha_short }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Bump version
              id: bump
              run: |
                  SHA_SHORT=$(git rev-parse --short HEAD)
                  CURRENT=$(jq -r '.version' version.json)

                  # Split version into parts
                  IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
                  PATCH=$((PATCH + 1))
                  NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

                  # Update version.json
                  jq --arg v "$NEW_VERSION" --arg d "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
                    '.version = $v | .updatedAt = $d' version.json > version.tmp && mv version.tmp version.json

                  echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
                  echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
                  echo "New version: $NEW_VERSION (sha: $SHA_SHORT)"

            - name: Commit version bump
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add version.json
                  git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
                  git push

