<!-- @dsCard group="Colors" viewport="700x230" name="Semantic surfaces — light & dark" subtitle="The same role tokens, both themes side by side" -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:#8a909a;padding:16px;font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .pane{background:var(--bg-canvas);border-radius:var(--radius-lg);padding:14px;border:1px solid var(--border)}
  .tag{font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:10px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;box-shadow:var(--shadow-sm);margin-bottom:8px}
  .h{font-family:var(--font-display);font-weight:700;color:var(--text-strong);font-size:14px}
  .b{color:var(--text-body);font-size:12px;margin-top:2px}
  .m{color:var(--text-muted);font-size:11px;margin-top:2px}
  .dots{display:flex;gap:6px;margin-top:8px}
  .dot{width:22px;height:22px;border-radius:50%}
</style></head><body>
  <div class="pane" data-theme="light">
    <div class="tag">Tema claro</div>
    <div class="card"><div class="h">Resgate 24 Horas</div><div class="b">Texto de corpo no surface.</div><div class="m">Texto secundário / legendas.</div>
      <div class="dots"><span class="dot" style="background:var(--brand)"></span><span class="dot" style="background:var(--secondary)"></span><span class="dot" style="background:var(--accent)"></span><span class="dot" style="background:var(--warning)"></span></div>
    </div>
  </div>
  <div class="pane" data-theme="dark">
    <div class="tag">Tema escuro</div>
    <div class="card"><div class="h">Resgate 24 Horas</div><div class="b">Texto de corpo no surface.</div><div class="m">Texto secundário / legendas.</div>
      <div class="dots"><span class="dot" style="background:var(--brand)"></span><span class="dot" style="background:var(--secondary)"></span><span class="dot" style="background:var(--accent)"></span><span class="dot" style="background:var(--warning)"></span></div>
    </div>
  </div>
</body></html>
