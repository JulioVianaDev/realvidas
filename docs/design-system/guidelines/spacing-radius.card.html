<!-- @dsCard group="Spacing" viewport="700x150" name="Radius & elevation" subtitle="Corner radii + the navy-tinted shadow set" -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-canvas);padding:20px;font-family:var(--font-body)}
  .row{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  .box{width:62px;height:62px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-family:var(--font-mono);font-size:9px;color:var(--text-subtle)}
  .sh{width:72px;height:62px;background:var(--surface);border-radius:var(--radius-md);display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-family:var(--font-mono);font-size:9px;color:var(--text-subtle)}
  .sep{width:1px;height:62px;background:var(--border)}
</style></head><body>
<div class="row">
  <div class="box" style="border-radius:var(--radius-xs)">xs</div>
  <div class="box" style="border-radius:var(--radius-sm)">sm</div>
  <div class="box" style="border-radius:var(--radius-md)">md</div>
  <div class="box" style="border-radius:var(--radius-lg)">lg</div>
  <div class="box" style="border-radius:var(--radius-xl)">xl</div>
  <div class="box" style="border-radius:var(--radius-pill)">pill</div>
  <div class="sep"></div>
  <div class="sh" style="box-shadow:var(--shadow-xs)">xs</div>
  <div class="sh" style="box-shadow:var(--shadow-sm)">sm</div>
  <div class="sh" style="box-shadow:var(--shadow-md)">md</div>
  <div class="sh" style="box-shadow:var(--shadow-lg)">lg</div>
  <div class="sh" style="box-shadow:var(--shadow-brand)">brand</div>
</div>
</body></html>
