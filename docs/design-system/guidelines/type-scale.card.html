<!-- @dsCard group="Type" viewport="700x160" name="Type scale & families" subtitle="2xs → 5xl · Montserrat / Source Sans 3" -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-canvas);padding:18px;font-family:var(--font-body);color:var(--text-body)}
  .fams{display:flex;gap:24px;margin-bottom:14px;flex-wrap:wrap}
  .fam{display:flex;flex-direction:column}
  .fam .big{font-size:30px;color:var(--text-strong)}
  .fam .nm{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);margin-top:2px}
  .scale{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;border-top:1px solid var(--border);padding-top:12px}
  .scale span{color:var(--text-strong);font-family:var(--font-display);font-weight:700}
</style></head><body>
  <div class="fams">
    <div class="fam"><span class="big" style="font-family:var(--font-display);font-weight:800">Montserrat 800</span><span class="nm">--font-display · headings, UI</span></div>
    <div class="fam"><span class="big" style="font-family:var(--font-body);font-weight:400">Source Sans 3</span><span class="nm">--font-body · text, forms</span></div>
  </div>
  <div class="scale">
    <span style="font-size:11px">2xs</span><span style="font-size:12px">xs</span><span style="font-size:14px">sm</span><span style="font-size:16px">base</span><span style="font-size:18px">md</span><span style="font-size:22px">lg</span><span style="font-size:28px">xl</span><span style="font-size:36px">2xl</span><span style="font-size:48px">3xl</span>
  </div>
</body></html>
