<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-canvas); padding: 22px; font-family: var(--font-body); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Textarea, Select, Checkbox, Switch, Field, Icon } = window.RealVidasDesignSystem_066fed;
  function Demo() {
    const [sw, setSw] = React.useState(true);
    return (
      <div className="cols">
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <Field label="Seu nome" htmlFor="n" required>
            <Input id="n" leftIcon={<Icon name="user" size={18} />} placeholder="Nome completo" />
          </Field>
          <Field label="Telefone / Celular" htmlFor="t" hint="Atendimento e WhatsApp 24h">
            <Input id="t" leftIcon={<Icon name="phone" size={18} />} placeholder="(12) 99715-1128" />
          </Field>
          <Field label="E-mail" htmlFor="e" error="Informe um e-mail válido">
            <Input id="e" invalid leftIcon={<Icon name="mail" size={18} />} defaultValue="faleconosco@" />
          </Field>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <Field label="Estado de origem" htmlFor="uf">
            <Select id="uf" options={[{value:"SP",label:"São Paulo"},{value:"RJ",label:"Rio de Janeiro"},{value:"MG",label:"Minas Gerais"}]} />
          </Field>
          <Field label="Observações" htmlFor="o">
            <Textarea id="o" rows={3} placeholder="Detalhes da remoção…" />
          </Field>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <Checkbox label="Aceito contato pelo WhatsApp" defaultChecked />
            <Switch label="Receber notícias da Real Vidas" checked={sw} onChange={e=>setSw(e.target.checked)} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
